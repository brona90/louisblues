name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ImageMagick
        run: |
          for i in 1 2 3; do
            sudo apt-get update && \
            sudo apt-get install -y imagemagick librsvg2-bin && break
            echo "apt attempt $i failed; retrying..." && sleep 5
          done

      - name: Build site
        run: python3 build.py

      - name: Assemble dist
        shell: bash
        run: |
          mkdir -p dist
          shopt -s nullglob
          cp -r *.html *.png *.svg *.webmanifest *.js dist/
          ls -1 dist

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
